name: MoodSync APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake ninja-build ccache libltdl-dev

      - name: Buildozer + Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache SDK/NDK/p4a
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Vérifier google-services.json
        run: |
          if [ -f google-services.json ]; then
            echo "google-services.json OK"
          else
            echo "ERREUR: google-services.json manquant"
            exit 1
          fi

      - name: Build APK debug
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          echo "=== Recherche APK ==="
          find . -name "*.apk" 2>/dev/null || echo "Pas d'APK trouvé"
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MoodSync-APK
          path: |
            bin/*.apk
            build.log
          if-no-files-found: warn
